<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahitha Bushap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Patrick+Hand&family=Permanent+Marker&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --paper: #FFFEF7;
            --paper-shadow: #E8E6D8;
            --ink: #2C2C2C;
            --pink: #E8B4C8;
            --blue-ink: #4A7C9E;
            --pencil-gray: #8B8B8B;
            --notebook-line: rgba(44, 44, 44, 0.1);
        }

        body {
            font-family: 'Patrick Hand', cursive;
            background: linear-gradient(135deg, #B8A798 0%, #8B7968 100%);
            color: var(--ink);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
        }

        .notebook {
            width: 90vw;
            max-width: 1200px;
            height: 85vh;
            position: relative;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--paper);
            border-radius: 8px;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.3),
                inset 0 0 100px rgba(0, 0, 0, 0.02);
        }

        /* Notebook Lines */
        .page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: repeating-linear-gradient(
                transparent,
                transparent 29px,
                var(--notebook-line) 29px,
                var(--notebook-line) 30px
            );
            pointer-events: none;
            border-radius: 8px;
        }

        /* Left margin line */
        .page::after {
            content: '';
            position: absolute;
            top: 0;
            left: 80px;
            bottom: 0;
            width: 2px;
            background: var(--pink);
            opacity: 0.3;
            pointer-events: none;
        }

        .page-content {
            position: relative;
            width: 100%;
            height: 100%;
            padding: 60px 80px 60px 120px;
            overflow-y: auto;
            z-index: 1;
        }

        .page-content::-webkit-scrollbar {
            width: 8px;
        }

        .page-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .page-content::-webkit-scrollbar-thumb {
            background: var(--pink);
            border-radius: 4px;
        }

        .page-number {
            position: absolute;
            bottom: 30px;
            right: 50px;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--pencil-gray);
            z-index: 2;
        }

        .page-title {
            font-family: 'Permanent Marker', cursive;
            font-size: 4rem;
            color: var(--pink);
            margin-bottom: 2rem;
            line-height: 1.2;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
        }

        .page-subtitle {
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            color: var(--pencil-gray);
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .handwritten-text {
            font-family: 'Patrick Hand', cursive;
            font-size: 1.3rem;
            line-height: 1.8;
            color: var(--ink);
            margin-bottom: 1.5rem;
        }

        .highlight {
            background: linear-gradient(180deg, transparent 60%, var(--pink) 60%);
            padding: 0 4px;
        }

        .doodle {
            position: absolute;
            opacity: 0.15;
            pointer-events: none;
        }

        .doodle-star {
            font-size: 2rem;
            color: var(--pink);
            top: 50px;
            right: 100px;
        }

        .doodle-heart {
            font-size: 1.5rem;
            color: var(--pink);
            bottom: 100px;
            left: 150px;
        }

        @media (max-width: 768px) {
            .notebook {
                width: 95vw;
                height: 90vh;
            }

            .page-content {
                padding: 40px 30px 40px 50px;
            }

            .page-title {
                font-size: 2.5rem;
            }

            .page-subtitle {
                font-size: 1.3rem;
            }

            .handwritten-text {
                font-size: 1.1rem;
            }

            .page::after {
                left: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="notebook">
        <div class="page">
            <div class="page-content">
                <div class="doodle doodle-star">★</div>
                <div class="doodle doodle-heart">★</div>
                <h1 class="page-title">Mahitha's Studio</h1>
                <p class="page-subtitle"> ......... </p>
                <p class="handwritten-text">
                    Hi there! —
                </p>
                <p class="handwritten-text">
                   -------
                </p>
                    Coming soon ✨
                </p>
            </div>
            <div class="page-number">01</div>
        </div>
    </div>
</body>
</html>
